<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Architecture — QR Inventory Management</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(165deg, #e8f0fe 0%, #f1f5f9 45%, #fafafa 100%);
      color: #0f172a;
      padding: 1.5rem;
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: #1e3a5f;
    }
    header p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.35rem;
    }
    .canvas-wrap {
      max-width: 1180px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.1);
      padding: 1.5rem 1rem 1rem;
      overflow-x: auto;
    }
    svg.diagram {
      display: block;
      width: 100%;
      min-width: 1100px;
      height: auto;
    }
    .legend {
      max-width: 1180px;
      margin: 1.25rem auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
      font-size: 0.75rem;
      color: #475569;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    @media print {
      body { background: #fff; padding: 0.5rem; }
      .canvas-wrap { box-shadow: none; border: 1px solid #cbd5e1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Figure. System Architecture Diagram</h1>
    <p>QR-Code Integrated Inventory Management System — College of Criminology Equipment Office</p>
  </header>

  <div class="canvas-wrap">
    <svg class="diagram" viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System architecture diagram">
      <defs>
        <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#f0f9ff"/>
          <stop offset="100%" style="stop-color:#ffffff"/>
        </linearGradient>
        <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#334155"/>
          <stop offset="100%" style="stop-color:#1e293b"/>
        </linearGradient>
        <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#3b82f6"/>
          <stop offset="100%" style="stop-color:#1d4ed8"/>
        </linearGradient>
        <linearGradient id="netGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#94a3b8"/>
          <stop offset="50%" style="stop-color:#64748b"/>
          <stop offset="100%" style="stop-color:#94a3b8"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
        </filter>
        <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
        </filter>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
        </marker>
        <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
        </marker>
        <!-- Avatar: generic head -->
        <g id="avatar-head">
          <ellipse cx="0" cy="8" rx="22" ry="24" fill="#fcd9b6"/>
          <path d="M-22,8 Q-22,-8 0,-14 Q22,-8 22,8" fill="#4a3728"/>
          <ellipse cx="0" cy="6" rx="20" ry="22" fill="#fcd9b6"/>
          <circle cx="-7" cy="4" r="2.5" fill="#1e293b"/>
          <circle cx="7" cy="4" r="2.5" fill="#1e293b"/>
          <path d="M-5,14 Q0,18 5,14" stroke="#c97b63" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </g>
      </defs>

      <!-- Background zones -->
      <rect width="1100" height="780" fill="url(#sky)"/>
      <rect x="20" y="55" width="1060" height="155" rx="12" fill="#fefce8" stroke="#fde047" stroke-width="1" stroke-dasharray="6 4" opacity="0.7"/>
      <text x="40" y="78" font-size="11" font-weight="700" fill="#a16207" letter-spacing="0.08em">PHYSICAL LAYER — COLLEGE OF CRIMINOLOGY EQUIPMENT ROOM</text>

      <rect x="20" y="230" width="1060" height="95" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
      <text x="40" y="255" font-size="11" font-weight="700" fill="#1d4ed8" letter-spacing="0.08em">NETWORK LAYER — HTTPS / LAN / WI-FI</text>

      <rect x="20" y="345" width="1060" height="280" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <text x="40" y="370" font-size="11" font-weight="700" fill="#475569" letter-spacing="0.08em">APPLICATION LAYER — NEXT.JS 16 (APP ROUTER) ON NODE.JS SERVER</text>

      <rect x="20" y="645" width="1060" height="115" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
      <text x="40" y="670" font-size="11" font-weight="700" fill="#1e40af" letter-spacing="0.08em">DATA LAYER — POSTGRESQL + PRISMA ORM</text>

      <!-- ========== PHYSICAL: Inventory shelf ========== -->
      <g transform="translate(48, 95)" filter="url(#softShadow)">
        <rect x="0" y="40" width="200" height="85" rx="4" fill="#78716c"/>
        <rect x="8" y="48" width="55" height="35" rx="2" fill="#a8a29e"/>
        <rect x="70" y="48" width="55" height="35" rx="2" fill="#a8a29e"/>
        <rect x="132" y="48" width="55" height="35" rx="2" fill="#a8a29e"/>
        <!-- Sample items -->
        <rect x="12" y="52" width="18" height="22" rx="2" fill="#1e3a5f"/>
        <text x="21" y="66" font-size="5" fill="#fff" text-anchor="middle">VEST</text>
        <rect x="78" y="52" width="22" height="20" rx="2" fill="#7c2d12"/>
        <text x="89" y="64" font-size="4" fill="#fff" text-anchor="middle">KIT</text>
        <rect x="140" y="52" width="20" height="22" rx="2" fill="#374151"/>
        <text x="150" y="65" font-size="4" fill="#fff" text-anchor="middle">CUFF</text>

        <g transform="translate(32, 78)">
          <rect width="14" height="14" fill="#fff" stroke="#0f172a" stroke-width="0.8"/>
          <rect x="2" y="2" width="4" height="4" fill="#0f172a"/><rect x="8" y="2" width="4" height="4" fill="#0f172a"/>
          <rect x="2" y="8" width="4" height="4" fill="#0f172a"/><rect x="8" y="8" width="4" height="4" fill="#0f172a"/>
        </g>
        <g transform="translate(98, 76)">
          <rect width="14" height="14" fill="#fff" stroke="#0f172a" stroke-width="0.8"/>
          <rect x="2" y="2" width="3" height="3" fill="#0f172a"/><rect x="7" y="2" width="5" height="3" fill="#0f172a"/>
          <rect x="2" y="7" width="5" height="5" fill="#0f172a"/><rect x="9" y="7" width="3" height="5" fill="#0f172a"/>
        </g>
        <text x="100" y="32" font-size="10" font-weight="600" fill="#44403c" text-anchor="middle">Sample inventory</text>
        <text x="100" y="44" font-size="8" fill="#78716c" text-anchor="middle">(uniforms, kits, gear)</text>
      </g>

      <!-- QR Scanner handheld -->
      <g transform="translate(280, 100)" filter="url(#softShadow)">
        <rect x="30" y="55" width="70" height="95" rx="8" fill="#1e293b"/>
        <rect x="36" y="62" width="58" height="70" rx="4" fill="#0f172a"/>
        <rect x="40" y="68" width="50" height="50" fill="#22c55e" opacity="0.3"/>
        <text x="65" y="98" font-size="7" fill="#86efac" text-anchor="middle">SCAN</text>
        <!-- viewfinder corners -->
        <path d="M42,72 L42,78 L48,78" stroke="#22c55e" stroke-width="2" fill="none"/>
        <path d="M78,72 L78,78 L72,78" stroke="#22c55e" stroke-width="2" fill="none"/>
        <path d="M42,112 L42,106 L48,106" stroke="#22c55e" stroke-width="2" fill="none"/>
        <path d="M78,112 L78,106 L72,106" stroke="#22c55e" stroke-width="2" fill="none"/>
        <rect x="48" y="138" width="34" height="8" rx="4" fill="#475569"/>

        <text x="65" y="158" font-size="8" fill="#64748b" text-anchor="middle">html5-qrcode</text>
        <!-- beam to QR -->
        <line x1="65" y1="55" x2="180" y2="120" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
      </g>

      <!-- ========== ACTORS with avatars ========== -->

      <!-- Admin -->
      <g transform="translate(420, 88)" filter="url(#softShadow)">
        <use href="#avatar-head" transform="translate(0, 0)"/>
        <rect x="-18" y="32" width="36" height="28" rx="4" fill="#1e3a5f"/>
        <rect x="-12" y="38" width="24" height="4" rx="1" fill="#fbbf24"/>

        <text x="0" y="84" font-size="7" fill="#64748b" text-anchor="middle">Users · Full control</text>
        <!-- Laptop -->
        <g transform="translate(-35, 92)">

          <rect x="8" y="8" width="54" height="28" fill="#3b82f6" opacity="0.4"/>
          <rect x="10" y="10" width="20" height="3" fill="#fff" opacity="0.8"/>
          <rect x="10" y="16" width="30" height="2" fill="#93c5fd"/>
          <rect x="10" y="20" width="25" height="2" fill="#93c5fd"/>
        </g>
      </g>

      <!-- Custodian -->
      <g transform="translate(560, 88)" filter="url(#softShadow)">
        <use href="#avatar-head" transform="translate(0, 0)"/>
        <rect x="-20" y="32" width="40" height="30" rx="4" fill="#059669"/>
        <rect x="-14" y="38" width="12" height="18" rx="1" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
        <line x1="-8" y1="42" x2="-8" y2="52" stroke="#92400e" stroke-width="0.8"/>
        <line x1="-11" y1="46" x2="-5" y2="46" stroke="#92400e" stroke-width="0.8"/>

        <text x="0" y="84" font-size="7" fill="#64748b" text-anchor="middle">Scan · Issue · Return</text>

        <g transform="translate(-38, 92)">
          <path d="M0,0 L70,0 L75,45 L-5,45 Z" fill="#94a3b8"/>

          <rect x="8" y="8" width="54" height="28" fill="#10b981" opacity="0.35"/>

        <rect x="45" y="104" width="16" height="24" rx="2" fill="#0f172a"/>

      <!-- Auditor -->
      <g transform="translate(700, 88)" filter="url(#softShadow)">
        <use href="#avatar-head" transform="translate(0, 0)"/>

        <text x="0" y="84" font-size="7" fill="#64748b" text-anchor="middle">Reports · Audit logs</text>
        <g transform="translate(-35, 92)">
          <path d="M0,0 L70,0 L75,45 L-5,45 Z" fill="#94a3b8"/>
          <rect x="4" y="4" width="62" height="38" rx="2" fill="#1e293b"/>
          <rect x="8" y="8" width="54" height="28" fill="#8b5cf6" opacity="0.35"/>
          <text x="35" y="26" font-size="6" fill="#fff" text-anchor="middle">CSV</text>
        </g>
      </g>

      <!-- Student / Borrower -->
      <g transform="translate(840, 92)" filter="url(#softShadow)">
        <use href="#avatar-head" transform="translate(0, 0)"/>
        <rect x="-16" y="32" width="32" height="26" rx="4" fill="#0369a1"/>
        <rect x="-18" y="34" width="10" height="22" rx="3" fill="#0c4a6e"/>
        <rect x="8" y="34" width="10" height="22" rx="3" fill="#0c4a6e"/>
        <text x="0" y="72" font-size="10" font-weight="700" fill="#0f172a" text-anchor="middle">Student</text>
        <text x="0" y="84" font-size="7" fill="#64748b" text-anchor="middle">(Borrower)</text>
        <text x="0" y="96" font-size="7" fill="#64748b" text-anchor="middle">Receives / returns gear</text>
        <!-- ID card -->
        <rect x="-22" y="102" width="44" height="28" rx="3" fill="#fff" stroke="#cbd5e1"/>
        <text x="0" y="116" font-size="6" fill="#64748b" text-anchor="middle">CRIM-2024-xxx</text>
        <rect x="-8" y="120" width="16" height="2" fill="#e2e8f0"/>
      </g>

      <!-- ========== NETWORK: Router + cables ========== -->
      <g transform="translate(380, 248)">
        <!-- Router -->
        <rect x="0" y="0" width="120" height="52" rx="8" fill="#334155" filter="url(#softShadow)"/>
        <circle cx="25" cy="26" r="4" fill="#22c55e"/>
        <circle cx="45" cy="26" r="4" fill="#22c55e"/>
        <circle cx="65" cy="26" r="4" fill="#fbbf24"/>
        <rect x="80" y="18" width="28" height="16" rx="2" fill="#1e293b"/>
        <text x="60" y="68" font-size="10" font-weight="600" fill="#334155" text-anchor="middle">Wi-Fi / LAN Router</text>
        <!-- Cloud internet -->
        <ellipse cx="300" cy="26" rx="55" ry="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="300" y="22" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">Internet</text>
        <text x="300" y="34" font-size="8" fill="#3b82f6" text-anchor="middle">HTTPS</text>
        <line x1="120" y1="26" x2="245" y2="26" stroke="url(#netGrad)" stroke-width="3"/>
        <line x1="355" y1="26" x2="480" y2="26" stroke="url(#netGrad)" stroke-width="3"/>
        <!-- Server icon in network -->
        <rect x="480" y="8" width="90" height="36" rx="6" fill="#475569"/>
        <text x="525" y="30" font-size="9" fill="#fff" text-anchor="middle">Node.js Host</text>
      </g>

      <!-- Cables from actors down to network -->
      <g stroke="#64748b" stroke-width="2" fill="none" opacity="0.6">
        <path d="M455,175 L455,230" marker-end="url(#arrowGray)"/>
        <path d="M595,175 L525,230"/>
        <path d="M735,175 L605,230"/>
        <path d="M875,175 L685,230"/>
        <path d="M350,175 L400,230" stroke-dasharray="5 3"/>
      </g>
      <text x="550" y="222" font-size="9" fill="#64748b" text-anchor="middle">JWT session · REST · Server Actions</text>

      <!-- Cables network to app -->
      <line x1="550" y1="310" x2="550" y2="345" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>

      <!-- ========== APPLICATION SERVER BOX ========== -->
      <g transform="translate(50, 385)" filter="url(#shadow)">
        <rect width="1000" height="225" rx="10" fill="url(#serverGrad)"/>
        <text x="500" y="28" font-size="13" font-weight="700" fill="#f8fafc" text-anchor="middle">Next.js Application Server</text>

        <!-- Middleware strip -->
        <rect x="20" y="40" width="960" height="32" rx="6" fill="#0f172a"/>
        <text x="500" y="60" font-size="10" fill="#94a3b8" text-anchor="middle">middleware.ts — Route protection · Session check · Redirect to /login</text>

        <!-- Modules row -->

        <!-- Web UI -->

        <text x="285" y="136" font-size="7" fill="#1e3a8a" text-anchor="middle">Borrowers · Scan · Transactions</text>
        <text x="285" y="148" font-size="7" fill="#1e3a8a" text-anchor="middle">Reports · Audit · Users</text>
